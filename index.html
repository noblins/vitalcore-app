};
const calcTDEE = (bmr, activity) => {
  const m = {
    sedentary: 1.2,
    light: 1.375,
    moderate: 1.55,
    active: 1.725,
    very_active: 1.9
  };
  return Math.round(bmr * (m[activity] || 1.2));
