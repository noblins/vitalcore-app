    <script>try {
const { useState, useEffect, useRef, useCallback } = React;

const SUPA_URL = 'https://mnzvexnaemdetznxeeuo.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uenZleG5hZW1kZXR6bnhlZXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjQxMTksImV4cCI6MjA5MDIwMDExOX0.3GizLSrEKjqrMeL88V1CNyHw9_L0f13t5SA_jk9REq0';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const calcBMR = (gender, weight, height, age) => {
  if (gender === 'male') return 10 * weight + 6.25 * height - 5 * age + 5;
  return 10 * weight + 6.25 * height - 5 * age - 161;
};
const calcTDEE = (bmr, activity) => {
  const m = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725, very_active:1.9 };
  return Math.round(bmr * (m[activity] || 1.2));
};
const calcAge = dob => {
  const today = new Date();
  let age = today.getFullYear() - new Date(dob).getFullYear();
  const md = today.getMonth() - new Date(dob).getMonth();
  if (md < 0 || (md === 0 && today.getDate() < new Date(dob).getDate())) age--;
  return age;
};

function App() {
  const [sc, setSc] = useState('splash');
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [tab, setTab] = useState('accueil');
  const [homeView, setHomeView] = useState('main');

  // Auth
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [authErr, setAuthErr] = useState('');

  // Onboarding
  const [obStep, setObStep] = useState(0);
  const [obData, setObData] = useState({ gender:'', dob:'', height:'', weight:'', goal:'', targetWeight:'', activity:'', glp1:'', diet:'' });

  // Nutrition
  const [meals, setMeals] = useState([]);
  const [foodName, setFoodName] = useState('');
  const [calories, setCalories] = useState('');
  const [protein, setProtein] = useState('');
  const [carbs, setCarbs] = useState('');
  const [fat, setFat] = useState('');
  const [showMealForm, setShowMealForm] = useState(false);
  const [mealMsg, setMealMsg] = useState('');
  const [scanning, setScanning] = useState(false);
  const [scanResult, setScanResult] = useState(null);
  const [scanPreview, setScanPreview] = useState('');
  const fileInputRef = useRef(null);

  // Coach
  const [messages, setMessages] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [typing, setTyping] = useState(false);

  // Profile/sub-views
  const [mood, setMood] = useState('');
  const [journalNote, setJournalNote] = useState('');
  const [subView, setSubView] = useState(null);
  const [showPremiumModal, setShowPremiumModal] = useState(false);
  const [journalEntries, setJournalEntries] = useState([]);
  const [journalMsg, setJournalMsg] = useState('');

  // Fasting
  const [fastProtocol, setFastProtocol] = useState('16:8');
  const [fastActive, setFastActive] = useState(null);
  const [fastTime, setFastTime] = useState({ elapsed:0, remaining:0 });
  const [fastHistory, setFastHistory] = useState([]);

  // Photos
  const [photoList, setPhotoList] = useState([]);
  const [photoWeight, setPhotoWeight] = useState('');
  const [photoNote, setPhotoNote] = useState('');
  const photoFileRef = useRef(null);

  // Medications/injections
  const [activeMed, setActiveMed] = useState(null);
  const [injLogs, setInjLogs] = useState([]);
  const [injSite, setInjSite] = useState('');
  const [injDose, setInjDose] = useState('');
  const [injNote, setInjNote] = useState('');
  const [injMsg, setInjMsg] = useState('');
  const [medName, setMedName] = useState('');
  const [medDose, setMedDose] = useState('');

  // Chat scroll ref (must be at top level - React hooks rules)
  const chatEndRef = useRef(null);
  useEffect(() => { if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: 'smooth' }); }, [messages, typing]);

  // Load user on mount
  useEffect(() => {
    const timer = setTimeout(async () => {
      try {
        const { data } = await sb.auth.getSession();
        if (data && data.session) {
          setUser(data.session.user);
          loadProfile(data.session.user.id);
        } else {
          setSc('welcome');
        }
      } catch(e) {
        console.error('Auth error:', e);
        setSc('welcome');
      }
    }, 2000);
    return () => clearTimeout(timer);
  }, []);

  const loadProfile = async (userId) => {
    const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
    if (data) {
      setProfile(data);
      if (data.onboarding_completed) {
        setSc('dashboard');
        loadDashboardData(userId);
      } else {
        setSc('onboarding');
      }
    } else {
      setSc('onboarding');
    }
  };

  const loadDashboardData = async (userId) => {
    const today = new Date().toISOString().split('T')[0];
    const { data: mealsData } = await sb.from('meals').select('*').eq('user_id', userId).eq('meal_date', today).order('created_at', { ascending: true });
    setMeals(mealsData || []);
    const { data: msgData } = await sb.from('chat_messages').select('*').eq('user_id', userId).order('created_at', { ascending: true }).limit(50);
    setMessages((msgData || []).map(m => ({ role: m.role, content: m.content })));
    const { data: fastData } = await sb.from('fasting_sessions').select('*').eq('user_id', userId).eq('status', 'active').single();
    setFastActive(fastData || null);
    const { data: fastHist } = await sb.from('fasting_sessions').select('*').eq('user_id', userId).eq('status', 'completed').order('created_at', { ascending: false }).limit(10);
    setFastHistory(fastHist || []);
    const { data: photoData } = await sb.from('progress_photos').select('*').eq('user_id', userId).order('created_at', { ascending: false });
    setPhotoList(photoData || []);
    const { data: medData } = await sb.from('medications').select('*').eq('user_id', userId).eq('active', true).single();
    setActiveMed(medData || null);
    const { data: injData } = await sb.from('injection_logs').select('*').eq('user_id', userId).order('created_at', { ascending: false }).limit(10);
    setInjLogs(injData || []);
  };

  // Auth
  const handleLogin = async () => {
    setAuthErr('');
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      setAuthErr(error.message);
    } else {
      const { data: sd } = await sb.auth.getSession();
      if (sd && sd.session) {
        setUser(sd.session.user);
        loadProfile(sd.session.user.id);
      }
    }
  };

  const handleSignup = async () => {
    setAuthErr('');
    const { error } = await sb.auth.signUp({ email, password });
    if (error) {
      setAuthErr(error.message);
    } else {
      const { data } = await sb.auth.signInWithPassword({ email, password });
      if (data && data.user) {
        setUser(data.user);
        await sb.from('profiles').insert({ id: data.user.id, email: data.user.email, full_name: '', subscription_plan: 'free' });
        setSc('onboarding');
      }
    }
  };

  const handleLogout = async () => {
    await sb.auth.signOut();
    setUser(null); setProfile(null); setSc('welcome'); setEmail(''); setPassword('');
  };

  // Onboarding
  const handleObFinish = async () => {
    const dob = obData.dob;
    const age = calcAge(dob);
    const height = parseFloat(obData.height);
    const weight = parseFloat(obData.weight);
    const bmr = calcBMR(obData.gender, weight, height, age);
    const tdee = calcTDEE(bmr, obData.activity);
    await sb.from('profiles').update({
      gender: obData.gender, date_of_birth: dob, age, height_cm: height, weight_kg: weight,
      target_weight_kg: parseFloat(obData.targetWeight), goal: obData.goal, activity_level: obData.activity,
      diet: obData.diet, tdee, onboarding_completed: true
    }).eq('id', user.id);
    // Auto-create medication if GLP-1 selected
    if (obData.glp1 && obData.glp1 !== '') {
      const nextInj = new Date(); nextInj.setDate(nextInj.getDate() + 7);
      await sb.from('medications').insert({
        user_id: user.id, medication_name: obData.glp1.charAt(0).toUpperCase() + obData.glp1.slice(1),
        dose_current: '0.25', dose_unit: 'mg', injection_day: 'Lundi',
        start_date: new Date().toISOString().split('T')[0], next_injection: nextInj.toISOString().split('T')[0],
        active: true
      });
    }
    setSc('dashboard');
    const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
    setProfile(data);
    loadDashboardData(user.id);
  };

  // Nutrition
  const handleAddMeal = async () => {
    if (!foodName || !calories) return;
    const today = new Date().toISOString().split('T')[0];
    const { error } = await sb.from('meals').insert({
      user_id: user.id, meal_date: today, food_name: foodName,
      calories: parseInt(calories), protein_g: parseFloat(protein) || 0,
      carbs_g: parseFloat(carbs) || 0, fat_g: parseFloat(fat) || 0
    });
    if (!error) {
      setFoodName(''); setCalories(''); setProtein(''); setCarbs(''); setFat('');
      setScanResult(null); setScanPreview(''); setShowMealForm(false);
      setMealMsg('Repas ajout\u00e9 \u2713');
      setTimeout(() => setMealMsg(''), 3000);
      loadDashboardData(user.id);
    }
  };

  const handleDeleteMeal = async (mealId) => {
    await sb.from('meals').delete().eq('id', mealId);
    loadDashboardData(user.id);
  };

  const handlePhotoScan = () => { fileInputRef.current && fileInputRef.current.click(); };

  const handlePhotoCapture = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setScanning(true); setShowMealForm(true);
    const reader = new FileReader();
    reader.onload = async (evt) => {
      const base64 = evt.target && evt.target.result ? evt.target.result.split(',')[1] : '';
      setScanPreview(evt.target && evt.target.result ? evt.target.result : '');
      try {
        const response = await fetch(SUPA_URL + '/functions/v1/analyze-meal-photo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ((await sb.auth.getSession()).data.session.access_token) },
          body: JSON.stringify({ image_base64: base64 })
        });
        const result = await response.json();
        setScanResult(result);
        setFoodName(result.food_name || ''); setCalories((result.calories || '').toString());
        setProtein((result.protein_g || '').toString()); setCarbs((result.carbs_g || '').toString());
        setFat((result.fat_g || '').toString());
      } catch (err) { console.error('Scan error:', err); }
      setScanning(false);
    };
    reader.readAsDataURL(file);
  };

  // Chat
  const sendMessage = async () => {
    if (!chatInput.trim()) return;
    const userMsg = { role: 'user', content: chatInput };
    setMessages(prev => [...prev, userMsg]);
    const msgText = chatInput;
    setChatInput('');
    setTyping(true);
    try {
      const session = await sb.auth.getSession();
      const token = session.data && session.data.session ? session.data.session.access_token : '';
      const response = await fetch(SUPA_URL + '/functions/v1/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ message: msgText, user_id: user.id })
      });

    // --- SUBVIEW: FASTING ---
    const renderFasting = () => e('div', { className: 'content' },
      e('button', { className: 'back-btn', onClick: () => setHomeView('main') }, '\u2190 Retour'),
      e('h2', { style: { marginBottom: 24 } }, 'Je\u00fbne Intermittent'),

          }))

        e('div', { style: { textAlign: 'center', marginBottom: 24 } },
          e('div', { className: 'progress-circle' },
            e('svg', { viewBox: '0 0 120 120' },
              e('circle', { cx: 60, cy: 60, r: 50, fill: 'none', stroke: '#e2e8f0', strokeWidth: 8 }),
              e('circle', { cx: 60, cy: 60, r: 50, fill: 'none', stroke: '#4fd1c5', strokeWidth: 8, strokeDasharray: 2 * Math.PI * 50, strokeDashoffset: 2 * Math.PI * 50 * (1 - Math.min(fastTime.elapsed / fastActive.target_hours, 1)), strokeLinecap: 'round', style: { transition: 'stroke-dashoffset 1s linear' } })),
            e('div', { className: 'progress-text' },

        e('div', { style: { display: 'flex', gap: 12, marginBottom: 12, justifyContent: 'center' } },
          e('div', { style: { textAlign: 'center' } }, e('div', { style: { fontSize: 12, color: '#64748b' } }, '\u00C9coul\u00e9'), e('div', { style: { fontSize: 18, fontWeight: 'bold', color: '#4fd1c5' } }, formatTime(fastTime.elapsed))),
          e('div', { style: { textAlign: 'center' } }, e('div', { style: { fontSize: 12, color: '#64748b' } }, 'Restant'), e('div', { style: { fontSize: 18, fontWeight: 'bold', color: '#3b82f6' } }, formatTime(fastTime.remaining)))),
        e('button', { className: 'btn btn-block', onClick: stopFasting }, 'Arr\u00eater le je\u00fbne'))
    );

    // --- SUBVIEW: PHOTOS ---
    const renderPhotos = () => e('div', { className: 'content' },
      e('button', { className: 'back-btn', onClick: () => setHomeView('main') }, '\u2190 Retour'),
      e('h2', { style: { marginBottom: 24 } }, 'Progression Photos'),
      e('div', { className: 'card' },
        e('div', { className: 'form-group' }, e('label', null, 'Poids (kg)'), e('input', { type: 'number', className: 'input', placeholder: '75', value: photoWeight, onChange: ev => setPhotoWeight(ev.target.value) })),
        e('div', { className: 'form-group' }, e('label', null, 'Notes'), e('input', { type: 'text', className: 'input', placeholder: 'Ex: Apr\u00e8s 1 mois', value: photoNote, onChange: ev => setPhotoNote(ev.target.value) })),
        e('button', { className: 'btn btn-block', onClick: () => photoFileRef.current && photoFileRef.current.click() }, '\uD83D\uDCF8 S\u00e9lectionner une photo'),
        e('input', { ref: photoFileRef, type: 'file', onChange: handleUploadPhoto, accept: 'image/*', className: 'hidden-file' })),
      photoList.length >= 2 && e('div', { className: 'card' },
        e('h3', { style: { marginBottom: 12 } }, 'Avant / Apr\u00e8s'),
        e('div', { className: 'comparison' },
          e('div', { className: 'comparison-photo' }, e('img', { src: photoList[photoList.length - 1].photo_url, alt: 'avant' }), e('div', { style: { fontSize: 12, color: '#64748b', padding: 8 } }, 'Avant')),
          e('div', { className: 'comparison-photo' }, e('img', { src: photoList[0].photo_url, alt: 'apr\u00e8s' }), e('div', { style: { fontSize: 12, color: '#64748b', padding: 8 } }, 'Apr\u00e8s')))),

          photoList.map(p => e('div', { key: p.id, className: 'photo-card' },

            e('div', { className: 'photo-date' }, new Date(p.created_at).toLocaleDateString('fr-FR'), p.weight_kg ? ' \u00B7 ' + p.weight_kg + 'kg' : '')))))

    // --- SUBVIEW: GLP-1 ---
    const renderGLP1 = () => e('div', { className: 'content' },
      e('button', { className: 'back-btn', onClick: () => setHomeView('main') }, '\u2190 Retour'),
      e('h2', { style: { marginBottom: 24 } }, 'Suivi GLP-1'),
      injMsg && e('div', { className: 'success' }, injMsg),
      !activeMed ? e('div', { className: 'card' },
        e('h3', { style: { marginBottom: 16 } }, 'Configurer votre m\u00e9dicament'),
        e('div', { className: 'form-group' },
          e('label', null, 'M\u00e9dicament'),
          e('select', { className: 'select', value: medName, onChange: ev => setMedName(ev.target.value) },
            e('option', { value: '' }, 'S\u00e9lectionner'), e('option', { value: 'Ozempic' }, 'Ozempic'), e('option', { value: 'Mounjaro' }, 'Mounjaro'), e('option', { value: 'Saxenda' }, 'Saxenda'), e('option', { value: 'Wegovy' }, 'Wegovy'))),
        e('div', { className: 'form-group' }, e('label', null, 'Dose actuelle (mg)'), e('input', { type: 'text', className: 'input', placeholder: '0.25', value: medDose, onChange: ev => setMedDose(ev.target.value) })),
        e('button', { className: 'btn btn-block', onClick: setupMedication }, 'Configurer')
      ) : e(React.Fragment, null,
        e('div', { className: 'card card-gradient' },
          e('div', { style: { marginBottom: 8 } }, 'M\u00e9dicament actif'),
          e('div', { style: { fontSize: 20, fontWeight: 'bold', marginBottom: 8 } }, activeMed.medication_name),
          e('div', { style: { fontSize: 14 } }, 'Dose: ', activeMed.dose_current, ' ', activeMed.dose_unit),
          activeMed.next_injection && e('div', { style: { fontSize: 14, marginTop: 4 } }, 'Prochaine injection: ', new Date(activeMed.next_injection).toLocaleDateString('fr-FR'))),
        e('div', { className: 'card' },
          e('h3', { style: { marginBottom: 16 } }, 'Logger une injection'),
          e('div', { className: 'form-group' },
            e('label', null, "Site d'injection"),
            e('div', { className: 'injection-site-grid' },
              ['Abdomen', 'Cuisse gauche', 'Cuisse droite', 'Bras gauche', 'Bras droit'].map(site =>
                e('button', { key: site, className: 'injection-btn ' + (injSite === site ? 'active' : ''), onClick: () => setInjSite(site) }, site)))),
          e('div', { className: 'form-group' }, e('label', null, 'Dose (mg)'), e('input', { type: 'number', className: 'input', placeholder: '0.5', value: injDose, onChange: ev => setInjDose(ev.target.value) })),
          e('div', { className: 'form-group' }, e('label', null, 'Notes'), e('input', { type: 'text', className: 'input', placeholder: 'Douleur, r\u00e9actions...', value: injNote, onChange: ev => setInjNote(ev.target.value) })),
          e('button', { className: 'btn btn-block', onClick: logInjection }, "Logger l'injection")),
        injLogs.length > 0 && e('div', { className: 'card' },
          e('h3', { style: { marginBottom: 12 } }, 'Historique (10 derni\u00e8res)'),
          injLogs.map(log => e('div', { key: log.id, className: 'injection-log' },
            e('div', null, e('strong', null, log.injection_site), ' \u00B7 ', log.dose, 'mg'),
            e('div', { style: { fontSize: 12, color: '#64748b' } }, new Date(log.injection_date).toLocaleDateString('fr-FR'), log.notes ? ' \u2022 ' + log.notes : '')))))
    );

    // --- MODAL: JOURNAL ---
    const renderJournalModal = () => e('div', { className: 'modal-overlay', onClick: () => setSubView(null) },
      e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
        e('h2', null, '\uD83D\uDCD4 Journal'),
        journalMsg && e('div', { className: 'success' }, journalMsg),
        e('div', { className: 'form-group' },
          e('label', null, 'Comment vous sentez-vous?'),
          e('div', { style: { display: 'flex', gap: 8, justifyContent: 'center', margin: '8px 0' } },
            [1,2,3,4,5].map(v => e('button', { key: v, onClick: () => setMood(v.toString()),
              style: { fontSize: 28, background: mood === v.toString() ? '#e0f2fe' : 'transparent', border: mood === v.toString() ? '2px solid #4fd1c5' : '2px solid transparent', borderRadius: 8, padding: 8, cursor: 'pointer' } }, moodEmoji(v))))),
        e('div', { className: 'form-group' },
          e('label', null, 'Notes du jour'),

        e('button', { className: 'btn btn-block', onClick: saveJournal }, 'Enregistrer'),
        e('button', { className: 'btn btn-secondary btn-block', onClick: () => setSubView(null) }, 'Fermer'),
        // Mood chart
        journalEntries.length > 0 && e('div', { style: { marginTop: 24 } },
          e('h3', { style: { marginBottom: 8, fontSize: 16 } }, '\u00C9volution de l\'humeur'),
          e('div', { className: 'mood-bar-container' },
            journalEntries.slice(0, 7).reverse().map((je, i) => e('div', { key: i, style: { flex: 1, textAlign: 'center' } },
              e('div', { className: 'mood-bar', style: { height: (je.mood / 5 * 100) + '%', background: moodColor(je.mood) } }),
              e('div', { className: 'mood-bar-label' }, new Date(je.entry_date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }))))),
          e('div', { style: { marginTop: 16 } },
            e('h3', { style: { marginBottom: 8, fontSize: 16 } }, 'Derni\u00e8res entr\u00e9es'),
            journalEntries.slice(0, 5).map(je => e('div', { key: je.id, className: 'journal-entry' },
              e('div', { style: { display: 'flex', justifyContent: 'space-between', marginBottom: 4 } },
                e('span', null, moodEmoji(je.mood), ' Humeur: ', je.mood, '/5'),
                e('span', { style: { fontSize: 12, color: '#64748b' } }, new Date(je.entry_date).toLocaleDateString('fr-FR'))),
              je.notes && e('div', { style: { fontSize: 13, color: '#475569' } }, je.notes))))))
    );

    // --- MODAL: PAYMENT ---
    const renderPaymentModal = () => e('div', { className: 'modal-overlay', onClick: () => setSubView(null) },
      e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
        e('h2', null, '\uD83D\uDCB3 Abonnement'),
        e('p', null, 'Plan actuel: ', e('strong', null, profile && profile.subscription_plan)),
        !isPremium && e(React.Fragment, null,
          e('div', { className: 'modal-price' }, '9.99\u20AC/mois'),
          e('button', { className: 'btn btn-block', onClick: handleUpgrade }, 'Upgrade \u00e0 Premium')),
        e('button', { className: 'btn btn-secondary btn-block', onClick: () => setSubView(null) }, 'Fermer')));

    // --- MODAL: PREMIUM ---
    const renderPremiumModal = () => e('div', { className: 'modal-overlay', onClick: () => setShowPremiumModal(false) },
      e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
        e('h2', null, '\u2728 VitalCore Premium'),
        e('p', { style: { marginBottom: 16, color: '#64748b' } }, 'D\u00e9verrouillez toutes les fonctionnalit\u00e9s avanc\u00e9es.'),
        e('div', { className: 'modal-price' }, '9.99\u20AC/mois'),
        e('div', { style: { marginBottom: 16, fontSize: 13, color: '#64748b', lineHeight: 1.6 } },
          '\u2713 Repas illimit\u00e9s', e('br'), '\u2713 Scan IA des repas', e('br'), '\u2713 Je\u00fbne intermittent', e('br'), '\u2713 Photos de progression', e('br'), '\u2713 Suivi GLP-1', e('br'), '\u2713 Journal premium'),
        e('button', { className: 'btn btn-block', onClick: handleUpgrade }, 'Upgrade Maintenant'),
        e('button', { className: 'btn btn-secondary btn-block', onClick: () => setShowPremiumModal(false) }, 'Plus tard')));

    // === MAIN RENDER ===
    return e('div', { className: 'container' },
      homeView === 'main' && e(React.Fragment, null,
        e('div', { className: 'tabs' },
          e('div', { className: 'tab ' + (tab === 'accueil' ? 'active' : ''), onClick: () => setTab('accueil') }, '\uD83C\uDFE0 Accueil'),
          e('div', { className: 'tab ' + (tab === 'nutrition' ? 'active' : ''), onClick: () => setTab('nutrition') }, '\uD83C\uDF4E Nutrition'),
          e('div', { className: 'tab ' + (tab === 'coach' ? 'active' : ''), onClick: () => setTab('coach') }, '\uD83E\uDD16 Coach'),
          e('div', { className: 'tab ' + (tab === 'profil' ? 'active' : ''), onClick: () => setTab('profil') }, '\uD83D\uDC64 Profil')),
        e('div', { className: 'content' },
          tab === 'accueil' && renderAccueil(),
          tab === 'nutrition' && renderNutrition(),
          tab === 'coach' && renderCoach(),
          tab === 'profil' && renderProfil()),
        subView === 'journal' && renderJournalModal(),
        subView === 'payment' && renderPaymentModal()),
      homeView === 'fasting' && renderFasting(),
      homeView === 'photos' && renderPhotos(),
      homeView === 'glp1' && renderGLP1(),
      showPremiumModal && renderPremiumModal()
    );
  }

  return null;
}

ReactDOM.render(React.createElement(App, null), document.getElementById('root'));
} catch(e) {
  var d = document.getElementById('error-display');
  if (d) { d.style.display = 'block'; d.textContent = 'CATCH Error: ' + e.message + '\n\nStack: ' + e.stack; }
  console.error('VitalCore Error:', e);
}</script>
