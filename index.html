            border-radius: 8px;
      e: 14px;

        .chip {

        .locked-card {

        .locked-overlay {

        .macros-grid {

        .macro-value {

        .progress-circle {

        .progress-circle svg {

        .progress-text {

        .back-btn {

        }
        .comparison {
            display: flex;

        }
        .comparison-photo {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
        }
        .comparison-photo img {

            object-fit: cover;
        }
        .injection-site-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;

        .injection-btn {

        .ai-analysis {

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Supabase setup
        const SUPA_URL = 'https://mnzvexnaemdetznxeeuo.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uenZleG5hZW1kZXR6bnhlZXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjQxMTksImV4cCI6MjA5MDIwMDExOX0.3GizLSrEKjqrMeL88V1CNyHw9_L0f13t5SA_jk9REq0';
        const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

        // TDEE calculation
        const calcBMR = (gender, weight, height, age) => {
            if (gender === 'male') return 10 * weight + 6.25 * height - 5 * age + 5;
            return 10 * weight + 6.25 * height - 5 * age - 161;
        };

        const calcTDEE = (bmr, activity) => {
            const m = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, very_active: 1.9 };
            return Math.round(bmr * (m[activity] || 1.2));
        };

        const calcAge = (dob) => {
            const today = new Date();
            let age = today.getFullYear() - new Date(dob).getFullYear();
            const monthDiff = today.getMonth() - new Date(dob).getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < new Date(dob).getDate())) age--;
            return age;
        };

        function App() {
            const [sc, setSc] = useState('splash'); // splash, welcome, login, signup, onboarding, dashboard
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [tab, setTab] = useState('accueil');
            const [homeView, setHomeView] = useState('main');

            // Auth state
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authErr, setAuthErr] = useState('');

            // Onboarding state
            const [obStep, setObStep] = useState(0);
            const [obData, setObData] = useState({
                gender: '',
                dob: '',
                height: '',
                weight: '',
                goal: '',
                targetWeight: '',
                activity: '',
                glp1: '',
                diet: ''
            });

            // Nutrition state
            const [meals, setMeals] = useState([]);
            const [foodName, setFoodName] = useState('');
            const [calories, setCalories] = useState('');
            const [protein, setProtein] = useState('');
            const [carbs, setCarbs] = useState('');
            const [fat, setFat] = useState('');
            const [scanning, setScanning] = useState(false);
            const [scanResult, setScanResult] = useState(null);
            const [scanPreview, setScanPreview] = useState('');
            const fileInputRef = useRef(null);

            // Coach state
            const [messages, setMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const [typing, setTyping] = useState(false);

            // Profile/sub-views state
            const [mood, setMood] = useState('');
            const [journalNote, setJournalNote] = useState('');
            const [subView, setSubView] = useState(null);
            const [showPremiumModal, setShowPremiumModal] = useState(false);

            // Fasting state
            const [fastProtocol, setFastProtocol] = useState('16:8');
            const [fastActive, setFastActive] = useState(null);
            const [fastTime, setFastTime] = useState({ elapsed: 0, remaining: 0 });
            const [fastHistory, setFastHistory] = useState([]);

            // Photos state
            const [photoList, setPhotoList] = useState([]);
            const [photoWeight, setPhotoWeight] = useState('');
            const [photoNote, setPhotoNote] = useState('');
            const photoFileRef = useRef(null);

            // Medications/injections state
            const [activeMed, setActiveMed] = useState(null);
            const [injLogs, setInjLogs] = useState([]);
            const [injSite, setInjSite] = useState('');
            const [injDose, setInjDose] = useState('');
            const [injNote, setInjNote] = useState('');

            // Load user on mount
            useEffect(() => {
                const timer = setTimeout(() => {
                    const session = sb.auth.session();
                    if (session) {
                        setUser(session.user);
                        loadProfile(session.user.id);
                    } else {
                        setSc('welcome');
                    }
                }, 2000);
                return () => clearTimeout(timer);
            }, []);

            // Load profile
            const loadProfile = async (userId) => {
                const { data, error } = await sb
                    .from('profiles')
                    .select('*')
                    .eq('id', userId)
                    .single();
                if (data) {
                    setProfile(data);
                    if (data.onboarding_completed) {
                        setSc('dashboard');
                        loadDashboardData(userId);
                    } else {
                        setSc('onboarding');
                    }
                } else {
                    setSc('onboarding');
                }
            };

            const loadDashboardData = async (userId) => {
                const today = new Date().toISOString().split('T')[0];

                const { data: mealsData } = await sb
                    .from('meals')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('meal_date', today);
                setMeals(mealsData || []);

                const { data: msgData } = await sb
                    .from('chat_messages')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: true });
                setMessages(msgData || []);

                const { data: fastData } = await sb
                    .from('fasting_sessions')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('status', 'active')
                    .single();
                setFastActive(fastData || null);

                const { data: fastHist } = await sb
                    .from('fasting_sessions')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('status', 'completed')
                    .order('created_at', { ascending: false })
                    .limit(10);
                setFastHistory(fastHist || []);

                const { data: photoData } = await sb
                    .from('progress_photos')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });
                setPhotoList(photoData || []);

                const { data: medData } = await sb
                    .from('medications')
                    .select('*')
                    .eq('user_id', userId)
                    .eq('active', true)
                    .single();
                setActiveMed(medData || null);

                const { data: injData } = await sb
                    .from('injection_logs')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false })
                    .limit(10);
                setInjLogs(injData || []);
            };

            // Auth functions
            const handleLogin = async () => {
                setAuthErr('');
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) {
                    setAuthErr(error.message);
                } else {
                    const session = sb.auth.session();
                    if (session) {
                        setUser(session.user);
                        loadProfile(session.user.id);
                    }
                }
            };

            const handleSignup = async () => {
                setAuthErr('');
                const { error } = await sb.auth.signUp({ email, password });
                if (error) {
                    setAuthErr(error.message);
                } else {
                    const { data } = await sb.auth.signInWithPassword({ email, password });
                    if (data.user) {
                        setUser(data.user);
                        await sb.from('profiles').insert({
                            id: data.user.id,
                            email: data.user.email,
                            full_name: '',
                            subscription_plan: 'free'
                        });
                        setSc('onboarding');
                    }
                }
            };

            const handleLogout = async () => {
                await sb.auth.signOut();
                setUser(null);
                setProfile(null);
                setSc('welcome');
                setEmail('');
                setPassword('');
            };

            // Onboarding
            const handleObNext = () => {
                if (obStep < 7) setObStep(obStep + 1);
            };

            const handleObPrev = () => {
                if (obStep > 0) setObStep(obStep - 1);
            };

            const handleObFinish = async () => {
                const dob = obData.dob;
                const age = calcAge(dob);
                const height = parseFloat(obData.height);
                const weight = parseFloat(obData.weight);
                const bmr = calcBMR(obData.gender, weight, height, age);
                const tdee = calcTDEE(bmr, obData.activity);

                await sb
                    .from('profiles')
                    .update({
                        gender: obData.gender,
                        date_of_birth: dob,
                        age,
                        height_cm: height,
                        weight_kg: weight,
                        target_weight_kg: parseFloat(obData.targetWeight),
                        goal: obData.goal,
                        activity_level: obData.activity,
                        diet: obData.diet,
                        glp1_medication: obData.glp1,
                        tdee,
                        onboarding_completed: true
                    })
                    .eq('id', user.id);

                setSc('dashboard');
                const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
                setProfile(data);
                loadDashboardData(user.id);
            };

            // Nutrition
            const handleAddMeal = async () => {
                if (!foodName || !calories) return;
                const today = new Date().toISOString().split('T')[0];
                await sb.from('meals').insert({
                    user_id: user.id,
                    meal_date: today,
                    food_name: foodName,
                    calories: parseInt(calories),
                    protein_g: parseFloat(protein) || 0,
                    carbs_g: parseFloat(carbs) || 0,
                    fat_g: parseFloat(fat) || 0
                });
                setFoodName('');

                            body: JSON.stringify({ image_base64: base64 })

                        setFoodName(result.food_name || '');
                        setCalories(result.calories?.toString() || '');
                        setProtein(result.protein_g?.toString() || '');

                                                        placeholder="50"
                                                        value={carbs}
                                                        onChange={(e) => setCarbs(e.target.value)}
                                                    />
                                                </div>
                                                <div className="form-group">
                                                    <label>Graisses (g)</label>
                                                    <input
                                                        type="number"
                                                        className="input"
                                                        placeholder="15"
                                                        value={fat}
                                                        onChange={(e) => setFat(e.target.value)}
                                                    />
                                                </div>
                                                <button className="btn btn-block" onClick={handleAddMeal}>
                                                    Ajouter le repas
                                                </button>
                                            </div>

                                            <div className="card">
                                                <h3 style={{ marginBottom: 12 }}>Résumé du jour</h3>
                                                <div className="macros-grid">
                                                    <div className="macro-box">
                                                        <div className="macro-value">{getTodayCalories()}</div>
                                                        <div className="macro-label">Calories</div>
                                                    </div>
                                                    <div className="macro-box">
                                                        <div className="macro-value">{getTodayProtein().toFixed(0)}</div>
                                                        <div className="macro-label">Protéine</div>
                                                    </div>
                                                    <div className="macro-box">
                                                        <div className="macro-value">{getTodayCarbs().toFixed(0)}</div>
                                                        <div className="macro-label">Glucides</div>
                                                    </div>
                                                </div>
                                            </div>

                                            {meals.length > 0 && (
                                                <div className="card">
                                                    <h3 style={{ marginBottom: 12 }}>Repas</h3>
                                                    <div className="meal-list">
                                                        {meals.map((m) => (
                                                            <div key={m.id} className="meal-item">
                                                                <span>{m.food_name}</span>
                                                                <span style={{ color: '#4fd1c5', fontWeight: 600 }}>
                                                                    {m.calories} kcal
                                                                </span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </>
                                    )}

                                    {tab === 'coach' && (
                                        <>
                                            <div
                                                style={{
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    gap: 8,
                                                    marginBottom: 16
                                                }}
                                            >
                                                <h2>Coach IA</h2>
                                                <span
                                                    style={{
                                                        background: '#4fd1c5',
                                                        color: 'white',
                                                        padding: '4px 8px',
                                                        borderRadius: 4,
                                                        fontSize: 12,
                                                        fontWeight: 600
                                                    }}
                                                >
                                                    Claude
                                                </span>
                                            </div>

                                            <div className="card" style={{ minHeight: 200 }}>
                                                <div className="chat-messages">
                                                    {messages.map((msg, idx) => (
                                                        <div
                                                            key={idx}
                                                            className={`message ${msg.role === 'user' ? 'user' : 'bot'}`}
                                                        >
                                                            {msg.content}
                                                        </div>
                                                    ))}
                                                    {typing && (
                                                        <div className="message bot">
                                                            <div className="typing">
                                                                <span></span>
                                                                <span></span>
                                                                <span></span>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>

                                            <div style={{ marginBottom: 16 }}>
                                                <span className="chip" onClick={() => setChatInput('Mon poids')}>
                                                    Mon poids
                                                </span>
                                                <span className="chip" onClick={() => setChatInput('Que manger?')}>
                                                    Que manger?
                                                </span>
                                                <span className="chip" onClick={() => setChatInput('Mes calories')}>
                                                    Mes calories
                                                </span>
                                                <span className="chip" onClick={() => setChatInput('Injection')}>
                                                    Injection
                                                </span>
                                                <span className="chip" onClick={() => setChatInput('Jeûne')}>
                                                    Jeûne
                                                </span>
                                            </div>

                                            <div className="input-bar">
                                                <input
                                                    type="text"
                                                    className="input"
                                                    placeholder="Posez une question..."
                                                    value={chatInput}
                                                    onChange={(e) => setChatInput(e.target.value)}
                                                    onKeyDown={(e) => {
                                                        if (e.key === 'Enter') sendMessage();
                                                    }}
                                                    style={{ marginBottom: 0 }}
                                                />
                                                <button className="btn" onClick={sendMessage} style={{ padding: 12 }}>
                                                    ➤
                                                </button>
                                            </div>
                                        </>
                                    )}

                                    {tab === 'profil' && (
                                        <>
                                            <div className="card card-gradient">
                                                <div style={{ marginBottom: 12 }}>
                                                    <div style={{ fontSize: 18, fontWeight: 'bold' }}>
                                                        {profile?.full_name || 'Utilisateur'}
                                                    </div>
                                                    <div style={{ fontSize: 14, opacity: 0.9 }}>
                                                        {profile?.email}
                                                    </div>
                                                </div>
                                                <span
                                                    style={{
                                                        background: 'rgba(255,255,255,0.3)',
                                                        padding: '4px 8px',
                                                        borderRadius: 4,
                                                        fontSize: 12,
                                                        fontWeight: 600,
                                                        display: 'inline-block'
                                                    }}
                                                >
                                                    {profile?.subscription_plan === 'premium'
                                                        ? '⭐ Premium'
                                                        : 'Gratuit'}
                                                </span>
                                            </div>

                                            <div className="card">
                                                <h3 style={{ marginBottom: 16 }}>Statistiques</h3>
                                                <div className="stats-grid">
                                                    <div className="stat-box">
                                                        <div className="stat-value">{profile?.weight_kg} kg</div>
                                                        <div className="stat-label">Poids actuel</div>
                                                    </div>
                                                    <div className="stat-box">
                                                        <div className="stat-value">
                                                            {profile?.target_weight_kg} kg
                                                        </div>
                                                        <div className="stat-label">Poids cible</div>
                                                    </div>
                                                    <div className="stat-box">
                                                        <div className="stat-value">{profile?.height_cm} cm</div>
                                                        <div className="stat-label">Hauteur</div>
                                                    </div>
                                                    <div className="stat-box">
                                                        <div className="stat-value">{profile?.age}</div>
                                                        <div className="stat-label">Âge</div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="card">
                                                <div style={{ marginBottom: 12, fontWeight: 600 }}>TDEE</div>
                                                <div style={{ fontSize: 24, color: '#3b82f6', fontWeight: 'bold' }}>
                                                    {profile?.tdee} kcal/jour
                                                </div>
                                            </div>

                                            <button
                                                className="btn btn-block"
                                                onClick={() => setSubView('journal')}
                                            >
                                                📔 Journal
                                            </button>
                                            <button
                                                className="btn btn-secondary btn-block"
                                                onClick={() => setSubView('payment')}
                                            >
                                                💳 Abonnement
                                            </button>
                                            <button
                                                className="btn btn-secondary btn-block"
                                                onClick={handleLogout}
                                            >
                                                Déconnexion
                                            </button>
                                        </>
                                    )}
                                </div>

                                {subView === 'journal' && (
                                    <div className="modal-overlay" onClick={() => setSubView(null)}>
                                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                                            <h2>📔 Journal</h2>
                                            <div className="form-group">
                                                <label>Humeur (1-5)</label>
                                                <select
                                                    className="select"
                                                    value={mood}
                                                    onChange={(e) => setMood(e.target.value)}
                                                >
                                                    <option value="">Sélectionner</option>
                                                    <option value="1">😞 Triste</option>
                                                    <option value="2">😞 Mauvais</option>
                                                    <option value="3">😐 Normal</option>
                                                    <option value="4">🙂 Bon</option>
                                                    <option value="5">😄 Excellent</option>
                                                </select>
                                            </div>
                                            {profile?.subscription_plan === 'premium' && (
                                                <div className="form-group">
                                                    <label>Notes</label>
                                                    <textarea
                                                        className="input"
                                                        placeholder="Vos pensées..."
                                                        value={journalNote}
                                                        onChange={(e) => setJournalNote(e.target.value)}
                                                        style={{ minHeight: 80, fontFamily: 'inherit' }}
                                                    ></textarea>
                                                </div>
                                            )}
                                            <button className="btn btn-block" onClick={() => setSubView(null)}>
                                                Fermer
                                            </button>
                                        </div>
                                    </div>
                                )}

                                {subView === 'payment' && (
                                    <div className="modal-overlay" onClick={() => setSubView(null)}>
                                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                                            <h2>💳 Abonnement</h2>
                                            <p>Plan actuel: <strong>{profile?.subscription_plan}</strong></p>
                                            {profile?.subscription_plan === 'free' && (
                                                <>
                                                    <div className="modal-price">9.99€/mois</div>
                                                    <button
                                                        className="btn btn-block"
                                                        onClick={handleUpgrade}
                                                    >
                                                        Upgrade à Premium
                                                    </button>
                                                </>
                                            )}
                                            <button
                                                className="btn btn-secondary btn-block"
                                                onClick={() => setSubView(null)}
                                            >
                                                Fermer
                                            </button>
                                        </div>
                                    </div>
                                ))}
                           </>
                        )}

                        {homeView === 'fasting' && (
                            <div className="content">
                                <button className="back-btn" onClick={() => setHomeView('main')}>
                                    ← Retour
                                </button>

                                <h2 style={{ marginBottom: 24 }}>Jeûne Intermittent</h2>

                                {!fastActive ? (
                                    <>
                                        <div className="card" style={{ marginBottom: 24 }}>
                                            <div style={{ marginBottom: 12 }}>Sélectionnez un protocole:</div>
                                            <div className="protocol-selector">
                                                <button
                                                    className={`protocol-btn ${fastProtocol === '16:8' ? 'active' : ''}`}
                                                    onClick={() => setFastProtocol('16:8')}
                                                >
                                                    16:8
                                                </button>
                                                <button
                                                    className={`protocol-btn ${fastProtocol === '18:6' ? 'active' : ''}`}
                                                    onClick={() => setFastProtocol('18:6')}
                                                >
                                                    18:6
                                                </button>
                                                <button
                                                    className={`protocol-btn ${fastProtocol === '20:4' ? 'active' : ''}`}
                                                    onClick={() => setFastProtocol('20:4')}
                                                >
                                                    20:4
                                                </button>
                                                <button
                                                    className={`protocol-btn ${fastProtocol === '23:1' ? 'active' : ''}`}
                                                    onClick={() => setFastProtocol('23:1')}
                                                >
                                                    OMAD
                                                </button>
                                            </div>
                                            <button className="btn btn-block" onClick={startFasting}>
                                                Démarrer le jeûne
                                            </button>
                                        </div>

                                        {fastHistory.length > 0 && (
                                            <div className="card">
                                                <h3 style={{ marginBottom: 12 }}>Historique</h3>
                                                {fastHistory.map((f) => {
                                                    const elapsed = (new Date(f.end_time) - new Date(f.start_time)) / (1000 * 60 * 60);
                                                    return (
                                                        <div key={f.id} className="injection-log">
                                                            <strong>{f.protocol}</strong> • {elapsed.toFixed(1)}h
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </>
                                ) : (
                                    <div className="card">
                                        <div style={{ textAlign: 'center', marginBottom: 24 }}>
                                            <div className="progress-circle">
                                                <svg viewBox="0 0 120 120">
                                                    <circle
                                                        cx="60"
                                                        cy="60"
                                                        r="50"
                                                        fill="none"
                                                        stroke="#e2e8f0"
                                                        strokeWidth="8"
                                                    />
                                                    <circle
                                                        cx="60"
                                                        cy="60"
                                                        r="50"
                                                        fill="none"
                                                        stroke="#4fd1c5"
                                                        strokeWidth="8"
                                                        strokeDasharray={`${2 * Math.PI * 50}`}
                                                        strokeDashoffset={`${
                                                            2 * Math.PI * 50 * (1 - fastTime.elapsed / fastActive.target_hours)
                                                        }`}
                                                        strokeLinecap="round"
                                                        style={{ transition: 'stroke-dashoffset 1s linear' }}
                                                    />
                                                </svg>
                                                <div className="progress-text">
                                                    <div className="progress-text-large">
                                                        {formatTime(fastTime.elapsed)}
                                                    </div>
                                                    <div className="progress-text-small">
                                                        / {formatTime(fastActive.target_hours)}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div
                                            style={{
                                                display: 'flex',
                                                gap: 12,
                                                marginBottom: 12,
                                                justifyContent: 'center'
                                            }}
                                        >
                                            <div style={{ textAlign: 'center' }}>
                                                <div style={{ fontSize: 12, color: '#64748b' }}>Écoulé</div>
                                                <div
                                                    style={{
                                                        fontSize: 18,
                                                        fontWeight: 'bold',
                                                        color: '#4fd1c5'
                                                    }}
                                                >
                                                    {formatTime(fastTime.elapsed)}
                                                </div>
                                            </div>
                                            <div style={{ textAlign: 'center' }}>
                                                <div style={{ fontSize: 12, color: '#64748b' }}>Restant</div>
                                                <div
                                                    style={{
                                                        fontSize: 18,
                                                        fontWeight: 'bold',
                                                        color: '#3b82f6'
                                                    }}
                                                >
                                                    {formatTime(fastTime.remaining)}
                                                </div>
                                            </div>
                                        </div>

                                        <button className="btn btn-block" onClick={stopFasting}>
                                            Arrêter le jeûne
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {homeView === 'photos' && (
                            <div className="content">
                                <button className="back-btn" onClick={() => setHomeView('main')}>
                                    ← Retour
                                </button>

                                <h2 style={{ marginBottom: 24 }}>Progression Photos</h2>

                                <div className="card">
                                    <div className="form-group">
                                        <label>Poids (kg)</label>
                                        <input
                                            type="number"
                                            className="input"
                                            placeholder="75"
                                            value={photoWeight}
                                            onChange={(e) => setPhotoWeight(e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Notes</label>
                                        <input
                                            type="text"
                                            className="input"
                                            placeholder="Ex: Après 1 mois"
                                            value={photoNote}
                                            onChange={(e) => setPhotoNote(e.target.value)}
                                        />
                                    </div>
                                    <button
                                        className="btn btn-block"
                                        onClick={() => photoFileRef.current?.click()}
                                    >
                                        📸 Sélectionner une photo
                                    </button>
                                    <input
                                        ref={photoFileRef}
                                        type="file"
                                        onChange={handleUploadPhoto}
                                        accept="image/*"
                                        className="hidden-file"
                                    />
                                </div>

                                {photoList.length >= 2 && (
                                    <div className="card">
                                        <h3 style={{ marginBottom: 12 }}>Avant / Après</h3>
                                        <div className="comparison">
                                            <div className="comparison-photo">
                                                <img src={photoList[photoList.length - 1].photo_url} alt="avant" />
                                                <div style={{ fontSize: 12, color: '#64748b', padding: 8 }}>
                                                    Avant
                                                </div>
                                            </div>
                                            <div className="comparison-photo">
                                                <img src={photoList[0].photo_url} alt="après" />
                                                <div style={{ fontSize: 12, color: '#64748b', padding: 8 }}>
                                                    Après
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {photoList.length > 0 && (
                                    <div className="card">
                                        <h3 style={{ marginBottom: 12 }}>Galerie</h3>
                                        <div className="photo-grid">
                                            {photoList.map((p) => (
                                                <div key={p.id} className="photo-card">
                                                    <img src={p.photo_url} alt="progress" />
                                                    <div className="photo-date">
                                                        {new Date(p.created_at).toLocaleDateString('fr-FR')}
                                                        {p.weight_kg && ` · ${p.weight_kg}kg`}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {homeView === 'glp1' && (
                            <div className="content">
                                <button className="back-btn" onClick={() => setHomeView('main')}>
                                    ← Retour
                                </button>

                                <h2 style={{ marginBottom: 24 }}>Suivi GLP-1</h2>

                                {activeMed && (
                                    <div className="card card-gradient">
                                        <div style={{ marginBottom: 8 }}>Médicament actif</div>
                                        <div style={{ fontSize: 20, fontWeight: 'bold', marginBottom: 12 }}>
                                            {activeMed.medication_name}
                                        </div>
                                        <div style={{ fontSize: 14 }}>
                                            Prochaine injection:{' '}
                                            {new Date(activeMed.next_injection).toLocaleDateString('fr-FR')}
                                        </div>
                                    </div>
                                )}

                                <div className="card">
                                    <h3 style={{ marginBottom: 16 }}>Logger une injection</h3>
                                    <div className="form-group">
                                        <label>Site d'injection</label>
                                        <div className="injection-site-grid">
                                            {['Abdomen', 'Cuisse gauche', 'Cuisse droite', 'Bras gauche', 'Bras droit'].map(
                                                (site) => (
                                                    <button
                                                        key={site}
                                                        className={`injection-btn ${injSite === site ? 'active' : ''}`}
                                                        onClick={() => setInjSite(site)}
                                                    >
                                                        {site}
                                                    </button>
                                                )
                                            )}
                                        </div>
                                    </div>
                                    <div className="form-group">
                                        <label>Dose (mg)</label>
                                        <input
                                            type="number"
                                            className="input"
                                            placeholder="0.5"
                                            value={injDose}
                                            onChange={(e) => setInjDose(e.target.value)}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>Notes</label>
                                        <input
                                            type="text"
                                            className="input"
                                            placeholder="Douleur, réactions..."
                                            value={injNote}
                                            onChange={(e) => setInjNote(e.target.value)}
                                        />
                                    </div>
                                    <button className="btn btn-block" onClick={logInjection}>
                                        Logger l'injection
                                    </button>
                                </div>

                                {injLogs.length > 0 && (
                                    <div className="card">
                                        <h3 style={{ marginBottom: 12 }}>Historique (10 dernières)</h3>
                                        {injLogs.map((log) => (
                                            <div key={log.id} className="injection-log">
                                                <div>
                                                    <strong>{log.injection_site}</strong> ·{' '}
                                                    {log.dose}mg
                                                </div>
                                                <div style={{ fontSize: 12, color: '#64748b' }}>
                                                    {new Date(log.injection_date).toLocaleDateString('fr-FR')}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            }

            if (showPremiumModal) {
                return (
                    <div className="modal-overlay" onClick={() => setShowPremiumModal(false)}>
                        <div className="modal" onClick={(e) => e.stopPropagation()}>
                            <h2>✨ VitalCore Premium</h2>
                            <p style={{ marginBottom: 16, color: '#64748b' }}>
                                Déverrouillez toutes les fonctionnalités avancées.
                            </p>
                            <div className="modal-price">9.99€/mois</div>
                            <div style={{ marginBottom: 16, fontSize: 13, color: '#64748b', lineHeight: 1.6 }}>
                                ✓ Repas illimités<br />
                                ✓ Scan IA des repas<br />
                                ✓ Jeûne intermittent<br />
                                ✓ Photos de progression<br />
                                ✓ Suivi GLP-1<br />
                                ✓ Journal premium
                            </div>
                            <button className="btn btn-block" onClick={handleUpgrade}>
                                Upgrade Maintenant
                            </button>
                            <button
                                className="btn btn-secondary btn-block"
                                onClick={() => setShowPremiumModal(false)}
                            >
                                Plus tard
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
